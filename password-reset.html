<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nueva contraseña | Confiesa</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f6f0ff;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
    padding:20px;
    box-sizing:border-box;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;

    width:min(90%,500px);
}

.icon{
    font-size:70px;
}

h1{
    color:#7c5ce6;
}

p{
    color:#555;
}

.input{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:12px;
    box-sizing:border-box;
}

.btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    background:#b39ddb;
    color:white;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

.message{
    margin-top:16px;
    font-size:14px;
}

@media (max-width:600px){

    .card{
        padding:30px 20px;
    }

    .icon{
        font-size:60px;
    }

    h1{
        font-size:30px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="icon">🔒</div>

    <h1>Nueva contraseña</h1>

    <p>
        Escribe tu nueva contraseña para continuar.
    </p>

    <input
        id="password"
        type="password"
        class="input"
        placeholder="Nueva contraseña"
    >

    <input
        id="confirmPassword"
        type="password"
        class="input"
        placeholder="Confirmar contraseña"
    >

    <button
        class="btn"
        onclick="updatePassword()"
    >
        Actualizar contraseña
    </button>

    <div
        id="message"
        class="message"
    ></div>

</div>

<script>

async function updatePassword() {

    const password =
        document.getElementById('password').value;

    const confirmPassword =
        document.getElementById('confirmPassword').value;

    const message =
        document.getElementById('message');

    if (!password || !confirmPassword) {

        message.innerHTML =
            'Completa todos los campos';

        return;
    }

    if (password !== confirmPassword) {

        message.innerHTML =
            'Las contraseñas no coinciden';

        return;
    }

    message.innerHTML =
        'Falta conectar con Supabase...';
}
</script>

</body>
</html>
