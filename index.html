<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confesiones del Evento</title>

<link rel="stylesheet" href="./css/styles.css">

</head>

<body>

<div class="container">

    <div id="confessionForm">

        <h1 id="pageTitle">💜 Confesiones</h1>

        <p>
            Tu confesión será revisada antes de publicarse.
        </p>

        <textarea
            id="message"
            maxlength="500"
            placeholder="Escribe tu confesión..."
        ></textarea>

        <input
            type="file"
            id="image"
            accept="image/*"
            style="
                margin-top:12px;
                width:100%;
            "
        >

        <button onclick="sendConfession()">
            Enviar confesión
        </button>

        <div id="status"></div>

    </div>

    <hr style="margin:30px 0">

    <h2 style="text-align:center;">
        Últimas confesiones
    </h2>

    <div id="feed"></div>

</div>

<script type="module" src="./js/main.js"></script>

</body>
</html>
