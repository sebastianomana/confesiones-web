<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confesiones del Evento</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #f4eefc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 500px;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #8f74d8;
}

p {
    text-align: center;
    color: #666;
}

textarea {
    width: 100%;
    height: 150px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    resize: none;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #b39ddb;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.success {
    color: green;
    text-align: center;
    margin-top: 10px;
}

.error {
    color: red;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <h1>💜 Confesiones del Evento</h1>

    <p>
        Tu confesión será revisada antes de publicarse.
    </p>

    <textarea
        id="message"
        maxlength="500"
        placeholder="Escribe tu confesión..."
    ></textarea>

    <button onclick="sendConfession()">
        Enviar confesión
    </button>

    <div id="status"></div>

    <hr style="margin:30px 0">

<h2 style="text-align:center;">
  Últimas confesiones
</h2>

<div id="feed"></div>

</div>

<script type="module" src="./js/main.js"></script>

</body>
</html>
