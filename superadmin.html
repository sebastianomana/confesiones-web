<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confiesa SuperAdmin</title>

<link rel="stylesheet" href="./css/super.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- SIDEBAR USUARIOS -->

    <aside class="users-panel">

        <div class="logo">
            💜 Confiesa
        </div>

        <div class="search-box">
            <input
                type="text"
                id="searchUser"
                placeholder="Buscar usuario..."
            >
        </div>

        <div id="usersList" class="users-list">

            <!-- JS -->

        </div>

    </aside>

    <!-- PANEL DERECHO -->

    <main class="content">

        <div id="userHeader" class="user-header">

            <img
                id="userAvatar"
                src="https://placehold.co/100x100"
                alt=""
            >

            <div>

                <h2 id="displayName">
                    Selecciona un usuario
                </h2>

                <p id="username">
                    @usuario
                </p>

                <span id="feedStatus" class="feed-status">
                    Feed público
                </span>

            </div>

        </div>

        <div id="confessionsContainer" class="confessions-container">

            <div class="empty-state">
                Selecciona un usuario para ver sus confesiones
            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/super.js"></script>

</body>
</html>
