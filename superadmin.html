<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confiesa SuperAdmin</title>

<link rel="stylesheet" href="./css/super.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- SIDEBAR USUARIOS -->

    <aside class="users-panel">

        <div class="logo">
            💜 Confiesa
        </div>

        <div class="search-box">
            <input
                type="text"
                id="searchUser"
                placeholder="Buscar usuario..."
            >
        </div>

        <div id="usersList" class="users-list">

            <!-- JS -->

        </div>

    </aside>

    <!-- PANEL DERECHO -->

    <main class="content">

        <div class="dashboard-stats">

    <div class="stat-card">
        <span id="totalUsers">0</span>
        <p>Usuarios</p>
    </div>

    <div class="stat-card">
        <span id="totalConfessions">0</span>
        <p>Confesiones</p>
    </div>

    <div class="stat-card">
        <span id="totalPending">0</span>
        <p>Pendientes</p>
    </div>

    <div class="stat-card">
        <span id="totalApproved">0</span>
        <p>Aprobadas</p>
    </div>

    <div class="stat-card">
        <span id="totalRejected">0</span>
        <p>Rechazadas</p>
    </div>

</div>

        <div id="userHeader" class="user-header">

            <img
                id="userAvatar"
                src="https://placehold.co/100x100"
                alt=""
            >

            <div>

                <h2 id="displayName">
                    Selecciona un usuario
                </h2>

                <p id="username">
                    @usuario
                </p>

                <span id="feedStatus" class="feed-status">
                    Feed público
                </span>

            </div>

        </div>

        <div class="filters">

    <button class="filter-btn active" onclick="filterConfessions('all', this)">
        Todas (<span id="countAll">0</span>)
    </button>

    <button class="filter-btn" onclick="filterConfessions('approved', this)">
        Aprobadas (<span id="countApproved">0</span>)
    </button>

    <button class="filter-btn" onclick="filterConfessions('pending', this)">
        Pendientes (<span id="countPending">0</span>)
    </button>

    <button class="filter-btn" onclick="filterConfessions('rejected', this)">
        Rechazadas (<span id="countRejected">0</span>)
    </button>

</div>

<div class="confession-search">
    <input
        type="text"
        id="confessionSearch"
        placeholder="Buscar confesiones..."
        oninput="searchConfessions()"
    >
</div>

        <div id="confessionsContainer" class="confessions-container">

            <div class="empty-state">
                Selecciona un usuario para ver sus confesiones
            </div>

        </div>

    </main>

</div>

<div id="imageModal" class="image-modal">

    <span id="closeModal" class="close-modal">
        ✕
    </span>

    <img
        id="modalImage"
        class="modal-image"
        src=""
    >

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/super.js"></script>

</body>
</html>
